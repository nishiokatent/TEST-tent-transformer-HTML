<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VTuber（調整強化版）</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
body{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  flex-direction:column;
}

canvas{
  border:1px solid #ccc;
}

video{
  display:none;
}
</style>
</head>

<body>

<h2>顔面：馬　β版</h2>

サイズ:
<input type="range" id="scaleSlider" min="0.5" max="3" step="0.01" value="1.5">
<span id="scaleValue">1.5</span>

<br><br>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script>
const video=document.getElementById("video")
const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

canvas.width=640
canvas.height=480

// ===== 画像 =====
const faceImg=new Image()
faceImg.src="face.png"

const faceRightImg=new Image()
faceRightImg.src="face_right.png"

const faceLeftImg=new Image()
faceLeftImg.src="face_left.png"

const mouthImg=new Image()
mouthImg.src="mouth_open.png"

let scaleAdjust=1.5

const slider=document.getElementById("scaleSlider")
const scaleText=document.getElementById("scaleValue")

slider.oninput=()=>{
scaleAdjust=parseFloat(slider.value)
scaleText.textContent=scaleAdjust
}

// ===== MediaPipe =====
const faceMesh=new FaceMesh({
locateFile:(file)=>{
return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
}
})

faceMesh.setOptions({
maxNumFaces:1,
refineLandmarks:true,
minDetectionConfidence:0.5,
minTrackingConfidence:0.5
})

faceMesh.onResults(results=>{

ctx.setTransform(1,0,0,1,0,0)
ctx.clearRect(0,0,canvas.width,canvas.height)
ctx.drawImage(results.image,0,0,canvas.width,canvas.height)

if(results.multiFaceLandmarks.length>0){

const lm=results.multiFaceLandmarks[0]

// ===== 中心 =====
const nose=lm[1]
const centerX=nose.x*canvas.width
const centerY=nose.y*canvas.height

// ===== サイズ（ちょいデカめベース）=====
const left=lm[234]
const right=lm[454]

const dx=(right.x-left.x)*canvas.width
const dy=(right.y-left.y)*canvas.height
const faceWidth=Math.sqrt(dx*dx + dy*dy)

// ★ここ強化
const size=faceWidth * 2.2 * scaleAdjust

// ===== 回転 =====
const angle=Math.atan2(
(right.y - left.y),
(right.x - left.x)
)

// ===== 向き判定（ゆるめ）=====
const ratio = (nose.x - left.x) / (right.x - left.x)

let direction="center"

if(ratio < 0.30){
direction="left"
}
else if(ratio > 0.80){
direction="right"
}

// ===== 口パク =====
const upper=lm[13]
const lower=lm[14]
const mouthOpen = Math.abs(upper.y - lower.y) > 0.02

// ===== 描画 =====
ctx.save()
ctx.translate(centerX, centerY)
ctx.rotate(angle)

if(direction==="right"){

if(mouthOpen){
ctx.drawImage(mouthImg, -size/2, -size/2, size, size)
}else{
ctx.drawImage(faceRightImg, -size/2, -size/2, size, size)
}

}
else if(direction==="left"){

if(mouthOpen){
ctx.drawImage(mouthImg, -size/2, -size/2, size, size)
}else{
ctx.drawImage(faceLeftImg, -size/2, -size/2, size, size)
}

}
else{

if(mouthOpen){
ctx.drawImage(mouthImg, -size/2, -size/2, size, size)
}else{
ctx.drawImage(faceImg, -size/2, -size/2, size, size)
}

}

ctx.restore()

}

})

// ===== カメラ =====
const camera=new Camera(video,{
onFrame:async()=>{
await faceMesh.send({image:video})
},
width:640,
height:480
})

camera.start()

</script>

</body>
</html>
