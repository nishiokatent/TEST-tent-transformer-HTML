<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VTuber（調整強化版）</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
body{
  margin:0;
  background:#f5f5f5;
  overflow:hidden;
}

/* 🎯 キャンバスは中央＋比率維持 */
canvas{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#000;
  /* 表示サイズを画面いっぱいに */
  width:100%;
  height:100%;
  max-width:100%;
  max-height:100%;
}

/* 🎛 UIを下に固定 */
.controls{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(255,255,255,0.9);
  padding:10px 15px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
  text-align:center;
}

input[type="range"]{
  width:200px;
}

video{
  display:none;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<!-- 🎛 UI -->
<div class="controls">
  <div>顔面：馬 β版</div>
  サイズ:
  <input type="range" id="scaleSlider" min="0.5" max="3" step="0.01" value="1.5">
  <span id="scaleValue">1.5</span>
</div>

<script>
const video=document.getElementById("video")
const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

// 🎯 縦横比維持フルスクリーン（iPhoneカメラ風 4:3）
function resizeCanvas(){
  const vw = window.innerWidth
  const vh = window.innerHeight

  const aspect = 4 / 3 // iPhoneカメラに近い比率

  let width = vh * aspect
  let height = vh

  // 画面幅に収まらない場合は幅優先
  if(width > vw){
    width = vw
    height = vw / aspect
  }

  // 描画解像度
  canvas.width = width
  canvas.height = height

  // 表示サイズ
  canvas.style.width = width + "px"
  canvas.style.height = height + "px"
}

// 初回
resizeCanvas()
// リサイズ対応
window.addEventListener("resize", resizeCanvas)

// ===== 画像 =====
const faceImg = new Image()
const faceRightImg = new Image()
const faceLeftImg = new Image()
const mouthImg = new Image()

faceImg.src="/face.png"
faceRightImg.src="/face_right.png"
faceLeftImg.src="/face_left.png"
mouthImg.src="/mouth_open.png"

let scaleAdjust=1.5

const slider=document.getElementById("scaleSlider")
const scaleText=document.getElementById("scaleValue")

slider.oninput=()=>{
scaleAdjust=parseFloat(slider.value)
scaleText.textContent=scaleAdjust
}

// ===== MediaPipe =====
const faceMesh=new FaceMesh({
locateFile:(file)=>{
return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
}
})

faceMesh.setOptions({
maxNumFaces:1,
refineLandmarks:true,
minDetectionConfidence:0.5,
minTrackingConfidence:0.5
})

faceMesh.onResults(results=>{

ctx.setTransform(1,0,0,1,0,0)
ctx.clearRect(0,0,canvas.width,canvas.height)
ctx.drawImage(results.image,0,0,canvas.width,canvas.height)

if(results.multiFaceLandmarks.length>0){

const lm=results.multiFaceLandmarks[0]

const nose=lm[1]
const centerX=nose.x*canvas.width
const centerY=nose.y*canvas.height

const left=lm[234]
const right=lm[454]

const dx=(right.x-left.x)*canvas.width
const dy=(right.y-left.y)*canvas.height
const faceWidth=Math.sqrt(dx*dx + dy*dy)

const size=faceWidth * 2.2 * scaleAdjust

const angle=Math.atan2(
(right.y - left.y),
(right.x - left.x)
)

const ratio = (nose.x - left.x) / (right.x - left.x)

let direction="center"

if(ratio < 0.4){
direction="left"
}
else if(ratio > 0.6){
direction="right"
}

const upper=lm[13]
const lower=lm[14]
const mouthOpen = Math.abs(upper.y - lower.y) > 0.02

ctx.save()

ctx.translate(centerX, centerY)
ctx.rotate(angle)

if(direction==="right"){
  ctx.drawImage(mouthOpen ? mouthImg : faceRightImg, -size/2, -size/2, size, size)
}
else if(direction==="left"){
  ctx.drawImage(mouthOpen ? mouthImg : faceLeftImg, -size/2, -size/2, size, size)
}
else{
  ctx.drawImage(mouthOpen ? mouthImg : faceImg, -size/2, -size/2, size, size)
}

ctx.restore()

}

})

// ===== カメラ =====
const camera=new Camera(video,{
onFrame:async()=>{
await faceMesh.send({image:video})
},
width:640,
height:480
})

camera.start()

</script>

</body>
</html>
